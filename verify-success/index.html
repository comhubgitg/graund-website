<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email подтверждён — Граунд</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #0E2A30;
      color: #D8E8EB;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      text-align: center;
      max-width: 420px;
      padding: 48px 32px;
    }
    .icon {
      width: 96px;
      height: 96px;
      margin: 0 auto 32px;
      background: linear-gradient(135deg, rgba(74,158,175,0.25), rgba(77,170,148,0.12));
      border: 1.5px solid rgba(74,158,175,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
    }
    h1 {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: #8AABAD;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .hint {
      font-size: 13px;
      color: #5A7A82;
      margin-top: 32px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#10003;</div>
    <h1>Email подтверждён</h1>
    <p>Ваш аккаунт активирован.</p>
    <p>Вернитесь в приложение — вход произойдёт автоматически.</p>
    <p class="hint">Если приложение не обновилось, закройте и откройте его заново.</p>
  </div>
</body>
</html>
